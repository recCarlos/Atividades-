<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Permite o uso de caracteres especiais -->
    <meta charset="UTF-8">

    <!-- Título da página -->
    <title>Contador</title>
</head>
<body>

    <!-- Exibe o valor atual do contador -->
    <h1 id="numero">0</h1>

    <!-- Botão para aumentar o contador -->
    <button id="incrementar">Incrementar</button>

    <!-- Botão para diminuir o contador -->
    <button id="decrementar">Decrementar</button>

    <!-- Botão para voltar o contador para 0 -->
    <button id="zerar">Zerar</button>

    <!-- Importa o arquivo JavaScript -->
    <script src="contador.js"></script>

</body>
</html>
