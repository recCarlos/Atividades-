<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>

    <!-- Conecta o CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculadora">

        <h1>Calculadora</h1>

        <!-- Campo para o primeiro número -->
        <input type="number" id="num1" placeholder="Primeiro número">

        <!-- Campo para o segundo número -->
        <input type="number" id="num2" placeholder="Segundo número">

        <div class="botoes">

            <!-- Botão de soma -->
            <button id="somar">+</button>

            <!-- Botão de subtração -->
            <button id="subtrair">-</button>

            <!-- Botão de multiplicação -->
            <button id="multiplicar">*</button>

            <!-- Botão de divisão -->
            <button id="dividir">/</button>

        </div>

        <!-- Exibe o resultado -->
        <h2>Resultado: <span id="resultado">0</span></h2>

    </div>

    <!-- Conecta o JavaScript -->
    <script src="script.js"></script>

</body>
</html>
