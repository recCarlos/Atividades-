<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Dev</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div Class="calculadora">
        <input type="text" id"visor" readonly>

        <div class-"botoes">
            <button onclick="limpaVisor()" class="btn-limpar">C</button>
            <button onclick="adicionarValor('/')" class="btn-operadir">/</button>
            <button onclick="adicionarValor('*')" class="btn-operador">*</button>
            <button onclick="apagarUltimo()" class="btn-operador">⌫</button>

            <button onclick="adicionarValor('7')">7</button>
            <button onclick="adicionarValor('8')">8</button>
            <button onclick="adicionarValor('9')">9</button>
            <button onclick="adicionarValor('-')" class="btn-operador">-</button>

            <button onclick="adicionarValor('4')">4</button>
            <button onclick="adicionarValor('5')">5</button>
            <button onclick="adicionarValor('6')">6</button>
            <button onclick="adicionarValor('+')" class="btn-operador">+</button>

            <button onclick="adicionarValor('1')">1</button>
            <button onclick="adicionarValor('2')">2</button>
            <button onclick="adicionarValor('3')">3</button>
            <button onclick="calcular()" class="btn-igual">=</button>

            <button onclick="adicionarValor('0')" class="btn-zero">0</button>
            <button onclick="adicionarValor('.')">.</button>
            </div>
            </div>

            <script src="script.js"></script>
</body>
</html>
