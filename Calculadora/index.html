<!DOCTYPE html>
<!-- Informa ao navegador que o documento usa HTML5 -->

<html lang="pt-BR">
<!-- Início da página e definição do idioma como português do Brasil -->

<head>
    <!-- Área de configurações da página -->

    <meta charset="UTF-8">
    <!-- Permite exibir caracteres especiais como ç, á, ã, é, etc. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz a página se adaptar a celulares e tablets -->

    <title>Calculadora</title>
    <!-- Texto exibido na aba do navegador -->

    <link rel="stylesheet" href="style.css">
    <!-- Conecta o arquivo CSS à página -->
</head>

<body>
    <!-- Conteúdo visível da página -->

    <main class="calculadora">
        <!-- Área principal da calculadora -->

        <h1>🧮 Calculadora</h1>
        <!-- Título principal -->

        <div class="campo">
            <!-- Agrupa o primeiro campo -->

            <label for="num1">
                Primeiro número
            </label>
            <!-- Texto associado ao input -->

            <input
                type="number"
                id="num1"
                placeholder="Digite um número">
            <!-- Campo para digitar o primeiro número -->
        </div>

        <div class="campo">
            <!-- Agrupa o segundo campo -->

            <label for="num2">
                Segundo número
            </label>
            <!-- Texto associado ao input -->

            <input
                type="number"
                id="num2"
                placeholder="Digite outro número">
            <!-- Campo para digitar o segundo número -->
        </div>

        <div class="botoes">
            <!-- Container dos botões -->

            <button onclick="calcular('+')">
                +
            </button>
            <!-- Chama a função calcular passando soma -->

            <button onclick="calcular('-')">
                −
            </button>
            <!-- Chama a função calcular passando subtração -->

            <button onclick="calcular('*')">
                ×
            </button>
            <!-- Chama a função calcular passando multiplicação -->

            <button onclick="calcular('/')">
                ÷
            </button>
            <!-- Chama a função calcular passando divisão -->
        </div>

        <section class="resultado">
            <!-- Área destinada ao resultado -->

            <h2>Resultado</h2>
            <!-- Título da seção -->

            <p id="resultado">
                0
            </p>
            <!-- Valor inicial exibido -->
        </section>

    </main>

    <script src="script.js"></script>
    <!-- Conecta o arquivo JavaScript à página -->

</body>
<!-- Fim do conteúdo visível -->

</html>
<!-- Fim do documento HTML -->
